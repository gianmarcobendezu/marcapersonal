<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gianmarco Bendezú</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        html {
    scroll-behavior: smooth;
}

        /* --- Base & Cursor --- */
        /* DESPUÉS: */
    body, html {
        margin: 0; padding: 0; width: 100%; min-height: 100%;
        background: #000000; font-family: 'Inter', sans-serif; color: white;
        overflow-x: hidden; overflow-y: auto; cursor: none; /* ✅ Permite scroll vertical */
    }


        @media (pointer: coarse) { body { cursor: auto; } #cursor-core { display: none; } }

        /* Cursor Estrella de Belén (Solo el centro) */
        #cursor-core {
            position: fixed; top: 0; left: 0; width: 28px; height: 28px;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); will-change: transform;
            filter: drop-shadow(0 0 8px rgba(165, 180, 252, 0.6));
            transition: filter 0.3s, transform 0.3s;
        }
        .star-svg { width: 100%; height: 100%; animation: breathe 3s ease-in-out infinite; }
        
        /* Animación de respiración para la estrella */
        @keyframes breathe {
            0%, 100% { transform: rotate(0deg) scale(1); }
            50% { transform: rotate(15deg) scale(1.05); }
        }

        /* Estado Hover: La estrella se agranda y brilla más */
        body.hovering #cursor-core {
            filter: drop-shadow(0 0 18px rgba(165, 180, 252, 1));
            transform: translate(-50%, -50%) scale(1.3);
        }

        /* Destello de Velocidad Luz */
        .warp-flash {
            position: fixed; inset: 0; z-index: 4; pointer-events: none;
            background: radial-gradient(circle at center, rgba(200, 220, 255, 0.25) 0%, transparent 50%);
            opacity: 0; transition: opacity 0.15s ease-out;
        }
        .warp-flash.active { opacity: 1; }

        #cosmos {
    position: fixed; /* ✅ Fijo para que no se mueva al scroll */
    top: 0; left: 0; width: 100%; height: 100%; z-index: 0;
}

.ui-layer {
    position: relative; z-index: 10; min-height: 100vh;
    display: flex; flex-direction: column; justify-content: center; align-items: center;
    pointer-events: none; text-align: center;
}

nav {
    position: absolute; top: 0; left: 0; right: 0;
    width: 100%;
    max-width: 1300px; /* Límite de ancho para que no se estire al borde */
    margin: 0 auto; /* Centra el menú automáticamente */
    padding: 2.5rem 5%; /* Margen de seguridad interno */
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: auto;
    box-sizing: border-box; /* Asegura que el padding no rompa la estructura */
}
        
        .logo{
    display:flex;
    align-items:center;
    gap:10px;
    color:white;
    font-family:Arial, sans-serif;
    font-size:22px;
    font-weight:600;
}

.logo-icon{
    width:50px;
    height:50px;
}
        
        .interactive-link {
            color: rgba(255, 255, 255, 0.6); text-decoration: none; margin-left: 2.5rem;
            font-size: 0.9rem; transition: 0.3s; position: relative;
        }
       /* Anula el hover del navegador (ya no responde al mouse real) */
.interactive-link:hover, .btn:hover {
    color: rgba(255, 255, 255, 0.6);
    text-shadow: none;
    background: rgba(255,255,255,0.05);
    transform: none;
    box-shadow: none;
}

/* Estilos que SOLO se activan cuando la estrella toca el elemento */
.star-trigger {
    color: #fff !important;
    text-shadow: 0 0 10px rgba(255,255,255,0.8) !important;
}
.btn.star-trigger {
    background: white !important;
    color: #000 !important;
    box-shadow: 0 0 30px rgba(255,255,255,0.5) !important;
    transform: scale(1.05) !important;
}
        .hero-content {
            padding: 2rem;
            background: radial-gradient(circle, rgba(0,0,0,0.6) 0%, transparent 70%);
            pointer-events: auto;
        }

        h1 {
            font-size: 4.5rem; font-weight: 800; margin: 0 0 0.5rem 0; line-height: 1.1;
            background: linear-gradient(to bottom, #ffffff 30%, #a5b4fc 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(100, 150, 255, 0.2);
        }

        .tagline {
            font-size: 1.1rem; color: #8fa6c9; margin-bottom: 3rem;
            letter-spacing: 3px; font-weight: 500; text-transform: uppercase;
        }

        .btn {
            display: inline-block; padding: 16px 42px; border-radius: 50px;
            background: rgba(255,255,255,0.05); color: white; text-decoration: none;
            font-weight: 600; border: 1px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease; backdrop-filter: blur(5px);
        }
        .btn:hover {
            background: white; color: #000;
            box-shadow: 0 0 30px rgba(255,255,255,0.5); transform: scale(1.05);
        }

        @media (max-width: 768px) {
            h1 { font-size: 3rem; } .interactive-link { display: none; }
        }

     /* Satélite WhatsApp Flotante */
.whatsapp-sat {
    position: fixed;
    bottom: 30px; right: 30px;
    width: 46px; height: 46px;
    z-index: 9999;
    display: flex; align-items: center; justify-content: center;
    border-radius: 50%;
    background: rgba(10, 15, 30, 0.4);
    backdrop-filter: blur(6px);
    border: 1px solid rgba(165, 180, 252, 0.2);
    box-shadow: 0 0 12px rgba(165, 180, 252, 0.15);
    animation: floatSat 4s ease-in-out infinite;
    transition: transform 0.3s, box-shadow 0.3s;
    cursor: none; /* Usa tu cursor estrella */
}

@keyframes floatSat {
    0%, 100% { transform: translateY(0px) rotate(0deg); }
    50% { transform: translateY(-6px) rotate(3deg); }
}

.whatsapp-sat:hover {
    box-shadow: 0 0 22px rgba(165, 180, 252, 0.6);
    border-color: rgba(165, 180, 252, 0.8);
    transform: scale(1.12) translateY(-6px) !important;
}

.whatsapp-sat svg { width: 100%; height: 100%; }

    </style>
</head>
<body>

    <div class="warp-flash" id="warpFlash"></div>
    
    <!-- Cursor Solo Estrella (Sin círculo/rastro) -->
    <div id="cursor-core">
        <svg class="star-svg" viewBox="0 0 40 40" fill="none">
            <path d="M20 0 L23 15 L38 18 L23 21 L20 36 L17 21 L2 18 L17 15 Z" fill="url(#starGrad)" />
            <defs>
                <radialGradient id="starGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
                    <stop offset="100%" stop-color="#a5b4fc" stop-opacity="0.8"/>
                </radialGradient>
            </defs>
        </svg>
    </div>

    <canvas id="cosmos"></canvas>

    <div class="ui-layer">
        <nav>
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" style="width: 60px; height: 60px;">
                    <g stroke="white" stroke-width="2.8" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        
                        <path d="M 28 15 L 60 44" />
                        <path d="M 92 21 L 60 44" />
            
                        <path d="M 28 15 L 28 39 L 39 49" />
                        <path d="M 28 68 L 60 96" />
            
                        <path d="M 60 44 L 60 96" />
                        <path d="M 92 21 L 92 73 L 60 96" />
                        
                        <path d="M 67 69 L 85 54" />
                        
                    </g>
                </svg>
                Gianmarco Bendezu
            </div>
            <div>
                <a href="#" class="interactive-link">Servicios</a>
                <a href="#" class="interactive-link">Sobre mí</a>
                <a href="#" class="interactive-link">Blog</a>
                <a href="#" class="interactive-link">Contacto</a>
            </div>
        </nav>

        <div class="hero-content">
            <h1>Del código al cosmos</h1>
            <p class="tagline">Build · Automate · Launch</p>
            <a href="#" id="turboBtn" class="btn interactive-link">TURBO MODE</a>
        </div>

        

    </div>

    <section id="servicios" style="min-height: 100vh; padding: 8rem 5%; position: relative; z-index: 5; background: linear-gradient(to bottom, transparent, #000 15%);">
        <h2 style="font-size: 3rem; text-align: center; margin-bottom: 3rem; color: #fff;">Servicios</h2>
        <p style="text-align: center; color: #8fa6c9; max-width: 600px; margin: 0 auto;">
            Aquí irá el contenido de tus servicios. El scroll se detendrá aquí automáticamente.
        </p>
    </section>

    <a href="https://wa.me/+51920006469" class="whatsapp-sat interactive-link" target="_blank" rel="noopener noreferrer">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Cuerpo central -->
            <circle cx="24" cy="24" r="5" fill="url(#satGrad)" stroke="rgba(165,180,252,0.4)" stroke-width="0.5"/>
            <!-- Paneles solares izq -->
            <rect x="6" y="20" width="14" height="8" rx="1" fill="rgba(165,180,252,0.1)" stroke="rgba(165,180,252,0.5)" stroke-width="0.5"/>
            <line x1="10" y1="20" x2="10" y2="28" stroke="rgba(165,180,252,0.3)" stroke-width="0.5"/>
            <line x1="16" y1="20" x2="16" y2="28" stroke="rgba(165,180,252,0.3)" stroke-width="0.5"/>
            <!-- Paneles solares der -->
            <rect x="28" y="20" width="14" height="8" rx="1" fill="rgba(165,180,252,0.1)" stroke="rgba(165,180,252,0.5)" stroke-width="0.5"/>
            <line x1="32" y1="20" x2="32" y2="28" stroke="rgba(165,180,252,0.3)" stroke-width="0.5"/>
            <line x1="38" y1="20" x2="38" y2="28" stroke="rgba(165,180,252,0.3)" stroke-width="0.5"/>
            <!-- Antena -->
            <path d="M24 19 L24 15" stroke="rgba(165,180,252,0.7)" stroke-width="1" stroke-linecap="round"/>
            <circle cx="24" cy="14" r="1.5" fill="rgba(165,180,252,0.6)"/>
            <!-- Anillo orbital -->
            <ellipse cx="24" cy="24" rx="17" ry="5.5" stroke="rgba(165,180,252,0.2)" stroke-width="0.5" transform="rotate(-20 24 24)"/>
            <defs>
                <radialGradient id="satGrad" cx="30%" cy="30%" r="70%">
                    <stop offset="0%" stop-color="#ffffff"/>
                    <stop offset="100%" stop-color="#a5b4fc"/>
                </radialGradient>
            </defs>
        </svg>
    </a>


    <script>
const cursorCore = document.getElementById('cursor-core');
const interactiveLinks = document.querySelectorAll('.interactive-link');

let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
let coreX = mouseX, coreY = mouseY;

window.addEventListener('mousemove', e => {
    mouseX = e.clientX; mouseY = e.clientY;
});

function checkHover() {
    // Caja de colisión de la estrella (28x28px centrada en coreX/Y)
    const star = { l: coreX - 14, r: coreX + 14, t: coreY - 14, b: coreY + 14 };

    interactiveLinks.forEach(link => {
        const el = link.getBoundingClientRect();
        // Colisión rectángulo vs rectángulo
        const isOver = !(star.r < el.left || star.l > el.right || 
                         star.b < el.top || star.t > el.bottom);
        
        isOver ? link.classList.add('star-trigger') : link.classList.remove('star-trigger');
    });
}

function animateCursor() {
    // Velocidad lenta y fluida (0.06 = ~2.5s de retraso visual)
    coreX += (mouseX - coreX) * 0.06;
    coreY += (mouseY - coreY) * 0.06;

    cursorCore.style.transform = `translate(${coreX - 14}px, ${coreY - 14}px)`;
    
    checkHover(); // Se ejecuta en cada frame, sincronizado con la estrella
    requestAnimationFrame(animateCursor);
}
animateCursor();

        // Interacción magnética
        interactiveLinks.forEach(link => {
            link.addEventListener('mouseenter', () => document.body.classList.add('hovering'));
            link.addEventListener('mouseleave', () => document.body.classList.remove('hovering'));
        });


        // --- 2. CANVAS & ANIMACIÓN ---
        const canvas = document.getElementById('cosmos');
        const ctx = canvas.getContext('2d');
        const warpFlash = document.getElementById('warpFlash');
        let width, height, centerX, centerY;

        function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    centerX = width / 2; centerY = height / 2;
}
// ✅ Esto ya está bien, solo confirma que se ejecute al cargar y al redimensionar
window.addEventListener('resize', resize); resize();

        // --- PARALLAX & WARP STATE ---
        let parallaxX = 0, parallaxY = 0;
        window.addEventListener('mousemove', e => {
            parallaxX = (e.clientX - width/2) * 0.05;
            parallaxY = (e.clientY - height/2) * 0.05;
        });

        let warpActive = false, warpFactor = 0;
        window.addEventListener('mousedown', () => {
            warpActive = true; warpFlash.classList.add('active');
        });
        window.addEventListener('mouseup', () => {
            warpActive = false;
            setTimeout(() => warpFlash.classList.remove('active'), 300);
        });

        // --- POLVO ESTELAR (Se mueve con Parallax) ---
        const dustStars = Array.from({ length: 500 }, () => ({
            x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
            size: Math.random() * 1.5, alpha: Math.random(), dir: Math.random() > 0.5 ? 1 : -1
        }));

        // --- COMETAS 3D (Trayectoria Fija, Ignoran Parallax) ---
        const comets = Array.from({ length: 6 }, () => ({
            x: (Math.random()-0.5)*width*2, y: (Math.random()-0.5)*height*2,
            z: Math.random()*width, pz: 0, speed: Math.random()*3+2
        }));

        function animate() {
            const targetWarp = warpActive ? 1 : 0;
            warpFactor += (targetWarp - warpFactor) * 0.1;
            
            ctx.fillStyle = '#000000';
            ctx.fillRect(0, 0, width, height);

            // Dibujar Polvo Estelar (Con Parallax)
            dustStars.forEach(s => {
                s.alpha += 0.01 * s.dir;
                if (s.alpha > 1 || s.alpha < 0.2) s.dir *= -1;
                
                const stretch = 1 + warpFactor * 15;
                ctx.beginPath();
                ctx.fillStyle = `rgba(255,255,255,${s.alpha})`;
                
                if (warpFactor > 0.1) {
                    ctx.ellipse(s.x + parallaxX, s.y + parallaxY, s.size * stretch, s.size, 0, 0, Math.PI*2);
                } else {
                    ctx.arc(s.x + parallaxX, s.y + parallaxY, s.size, 0, Math.PI*2);
                }
                ctx.fill();
            });

            // Dibujar Cometas (Trayectoria Fija hacia el centro)
            comets.forEach(c => {
                c.pz = c.z;
                c.z -= c.speed * (1 + warpFactor * 12);
                if (c.z < 1) { c.z = width; c.pz = width; }

                const scale = 300 / c.z;
                // PROYECCIÓN CENTRADA (Ignora parallax)
                const sx = centerX + c.x * scale;
                const sy = centerY + c.y * scale;
                const opacity = Math.min(1, (1 - c.z / width));

                const trailZ = c.z + (80 * (1 + warpFactor * 8));
                const tScale = 300 / trailZ;
                const tx = centerX + c.x * tScale;
                const ty = centerY + c.y * tScale;

                ctx.beginPath();
                const grad = ctx.createLinearGradient(tx, ty, sx, sy);
                grad.addColorStop(0, 'rgba(255,255,255,0)');
                grad.addColorStop(1, `rgba(255,255,255,${opacity})`);
                ctx.strokeStyle = grad;
                ctx.lineWidth = 2 + warpFactor * 4;
                ctx.moveTo(tx, ty); ctx.lineTo(sx, sy); ctx.stroke();

                ctx.beginPath();
                ctx.fillStyle = `rgba(255,255,255,${opacity})`;
                ctx.shadowBlur = 10 + warpFactor * 20;
                ctx.shadowColor = 'white';
                ctx.arc(sx, sy, 2 + warpFactor * 3, 0, Math.PI*2);
                ctx.fill();
                ctx.shadowBlur = 0;
            });

            requestAnimationFrame(animate);
        }
        animate();

        const turboBtn = document.getElementById('turboBtn');
        const serviciosSection = document.getElementById('servicios');

        turboBtn.addEventListener('click', (e) => {
            e.preventDefault(); // Evita salto brusco por href="#"
            
            // 1. Activar efecto luz
            warpActive = true;
            warpFlash.classList.add('active');
            
            // 2. Esperar 1 segundo y bajar suavemente
            setTimeout(() => {
                serviciosSection.scrollIntoView({ behavior: 'smooth' });
                
                // 3. Desactivar efecto luz después del scroll
                setTimeout(() => {
                    warpActive = false;
                    warpFlash.classList.remove('active');
                }, 600);
            }, 1000);
        });

    </script>
